<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf8f5" />
    <meta name="author" content="Golden Home Lloret" />
    <meta name="geo.region" content="ES-CT" />
    <meta name="geo.placename" content="Lloret de Mar" />
    <meta name="geo.position" content="41.6997;2.8457" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Golden Home Inmobiliaria | Venta de pisos y casas en Lloret de Mar</title>
    <link rel="canonical" href="https://goldenhomelloret.es/es" />
    <script>
      try {
        document.documentElement.classList.remove('dark');
        var stored = localStorage.getItem('golden-home-app');
        if (stored) {
          var parsed = JSON.parse(stored);
          if (parsed.state && parsed.state.darkMode === true) {
            document.documentElement.classList.add('dark');
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#1a1a1a');
          }
        }
      } catch (e) {}
    </script>
    <meta
      name="description"
      content="Tu hogar ideal, a un clic de distancia. Inmobiliaria en Lloret de Mar y la Costa Brava: venta de pisos, casas y villas con asesoramiento personalizado en goldenhomelloret.es."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
